- name: Install Redis Repo
  yum:
    name: http://rpms.remirepo.net/enterprise/remi-release-7.rpm
    state: present

- name: Install Redis
  yum:
    name: redis
    enablerepo: remi

- name: Update Redis Listen Add
  replace:
    path: /etc/redis.conf
    regexp: "127.0.0.1"
    replace: "0.0.0.0"

- name: Start Redis
  systemd:
    name: redis
    state: restarted
    enabled: yes