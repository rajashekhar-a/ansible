- name: Copy MongoDB repo file
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/mongodb.repo
    src: mongodb.repo

- name: Install MongoDB
  ansible.builtin.yum:
    name: mongodb-org
    state: present

- name: Update MongoDB Listen address
  ansible.builtin.replace:
    path: /etc/mongod.conf
    regexp: '127.0.0.1'
    replace: '0.0.0.0'

- name: Start MongoDB service
  ansible.builtin.systemd:
    name: mongod
    state: restarted
    enabled: yes

- name: Download Schema
  include_role:
    name: common
    tasks_from: download

- name: Set executable path for MongoDB shell commands
  set_fact:
    mongodb_shell_path: "/usr/bin/mongo"

- name: Load Schema
  community.mongodb.mongodb_shell:
    file: /tmp/mongodb-main/{{ item }}.js
    idempotent: yes
    mongodb_executable_path: "{{ mongodb_shell_path }}"
  loop:
    - catalogue
    - users
